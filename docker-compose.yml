services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8011}:8000"
    env_file:
      - ./backend/.env
    environment:
      - ANONYMIZED_TELEMETRY=False
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-8092}:80"
    depends_on:
      - backend
    restart: unless-stopped
